<canvas id="bgnet" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:1"></canvas>
<script>
(function(){
  const canvas = document.getElementById('bgnet');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W, H;
  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(DPR, DPR);
  }
  resize();
  window.addEventListener('resize', resize);
  
  const density = 0.00008; // particles per pixel
  const N = Math.max(40, Math.min(140, Math.floor(W * H * density)));
  const particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      r: Math.random() * 1.3 + 0.4
    });
  }
  
  const maxDist = 150;
  const maxDist2 = maxDist * maxDist;
  let mouseX = -9999, mouseY = -9999;
  window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  window.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });
  
  function frame(){
    var isDark = (window.__aevivo_theme || document.documentElement.dataset.theme || 'light') === 'dark';
    var lineRGB = isDark ? '196,162,101' : '12,18,37';
    var dotRGB = isDark ? '214,194,148' : '12,18,37';
    var dotAlpha = isDark ? 0.85 : 0.7;
    var lineMul = isDark ? 1 : 0.9;
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;
      if (p.y < -20) p.y = H + 20;
      if (p.y > H + 20) p.y = -20;
    }
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d2 = dx*dx + dy*dy;
        if (d2 < maxDist2) {
          const d = Math.sqrt(d2);
          const alpha = 0.28 * (1 - d/maxDist) * lineMul;
          ctx.strokeStyle = 'rgba(' + lineRGB + ',' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
      const mdx = particles[i].x - mouseX;
      const mdy = particles[i].y - mouseY;
      const md2 = mdx*mdx + mdy*mdy;
      if (md2 < 180*180) {
        const md = Math.sqrt(md2);
        const alpha = 0.25 * (1 - md/180) * lineMul;
        ctx.strokeStyle = 'rgba(' + lineRGB + ',' + alpha + ')';
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(mouseX, mouseY);
        ctx.stroke();
      }
    }
    for (const p of particles) {
      ctx.fillStyle = 'rgba(' + dotRGB + ',' + dotAlpha + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
