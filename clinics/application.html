<head>
<!-- AEVIVO ACCESS GATE -->
<script>
(function(){
  var KEY='aevivo-clinical-gate-v1',PW='CLINICAL2026';
  try{if(localStorage.getItem(KEY)===PW)return}catch(e){}
  document.documentElement.setAttribute('data-aevivo-locked','1');
  var css='html[data-aevivo-locked] body > *:not(#aevivo-gate){display:none !important}'
    +'#aevivo-gate{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0C1225;font-family:Inter,\'Helvetica Neue\',Arial,sans-serif;color:#FBF7EF;padding:24px}'
    +'#aevivo-gate::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 140% 60% at 50% -10%,rgba(196,162,101,0.08),transparent 55%),radial-gradient(circle at 85% 95%,rgba(196,162,101,0.05),transparent 40%);pointer-events:none}'
    +'#aevivo-gate .gate-card{position:relative;max-width:440px;width:100%;text-align:center;padding:48px 36px;background:rgba(20,27,46,0.7);border:1px solid rgba(196,162,101,0.22);border-radius:18px;backdrop-filter:blur(18px)}'
    +'#aevivo-gate .gate-mark{width:56px;height:56px;border:1.5px solid #C4A265;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:24px;color:#C4A265;font-weight:700;margin-bottom:22px}'
    +'#aevivo-gate .gate-brand{font-size:11px;letter-spacing:4px;color:#C4A265;font-weight:600;text-transform:uppercase;margin-bottom:14px}'
    +'#aevivo-gate .gate-heading{font-family:Georgia,\'Libre Baskerville\',serif;font-size:28px;font-weight:400;line-height:1.2;margin:0 0 10px;color:#FBF7EF}'
    +'#aevivo-gate .gate-heading em{color:#C4A265;font-style:italic}'
    +'#aevivo-gate .gate-sub{font-size:14px;color:rgba(251,247,239,0.65);font-weight:300;line-height:1.6;margin:0 0 28px}'
    +'#aevivo-gate form{margin:0}'
    +'#aevivo-gate input{width:100%;box-sizing:border-box;padding:14px 18px;background:rgba(251,247,239,0.05);border:1px solid rgba(196,162,101,0.22);border-radius:10px;color:#FBF7EF;font-size:14px;font-family:inherit;outline:none;letter-spacing:2px;text-align:center;margin-bottom:14px;transition:border-color 0.2s}'
    +'#aevivo-gate input::placeholder{color:rgba(251,247,239,0.35);letter-spacing:1px}'
    +'#aevivo-gate input:focus{border-color:#C4A265}'
    +'#aevivo-gate button{width:100%;padding:14px 24px;background:#C4A265;color:#060A14;border:none;border-radius:999px;font-family:inherit;font-weight:700;font-size:12px;letter-spacing:1.8px;text-transform:uppercase;cursor:pointer;transition:background 0.2s}'
    +'#aevivo-gate button:hover{background:#D4B67A}'
    +'#aevivo-gate .gate-error{font-size:12px;color:#D14343;margin-top:12px;min-height:16px;letter-spacing:0.3px}'
    +'#aevivo-gate .gate-foot{font-size:11px;color:rgba(251,247,239,0.4);margin-top:28px;letter-spacing:0.3px;line-height:1.5}'
    +'@keyframes aevivo-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}'
    +'#aevivo-gate.shake .gate-card{animation:aevivo-shake 0.4s ease}';
  var s=document.createElement('style');s.textContent=css;document.head.appendChild(s);
  function render(){
    var el=document.createElement('div');el.id='aevivo-gate';
    el.innerHTML='<div class="gate-card"><div class="gate-mark">A</div><div class="gate-brand">Aevivo Clinical</div><h1 class="gate-heading">Practitioner <em>preview.</em></h1><p class="gate-sub">Aevivo Clinical is the EU-GMP supply channel for longevity, health and wellness clinics. Enter your access code to continue.</p><form id="aevivo-gate-form"><input id="aevivo-gate-input" type="password" placeholder="Access code" autocomplete="off" autofocus/><button type="submit">Enter</button><div class="gate-error" id="aevivo-gate-err"></div></form><div class="gate-foot">For research use only. Not for human consumption.</div></div>';
    document.body.appendChild(el);
    var form=document.getElementById('aevivo-gate-form'),input=document.getElementById('aevivo-gate-input'),err=document.getElementById('aevivo-gate-err');
    form.addEventListener('submit',function(e){
      e.preventDefault();
      if(input.value.trim().toUpperCase()===PW){
        try{localStorage.setItem(KEY,PW)}catch(_){}
        document.documentElement.removeAttribute('data-aevivo-locked');
        el.remove();
      }else{
        err.textContent='Incorrect access code.';
        el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake');
        input.value='';input.focus();
      }
    });
    setTimeout(function(){input.focus()},50);
  }
  if(document.readyState!=='loading')render();
  else document.addEventListener('DOMContentLoaded',render);
})();
</script>
<!-- /AEVIVO ACCESS GATE -->

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const DARK_PALETTE = {
  bg:"#0C1225", white:"#141B2E", navy:"#FBF7EF", char:"#141A2E", gold:"#C4A265",
  copper:"#D4B67A", copperL:"#DEC18B", cream:"#0F1525", border:"rgba(196,162,101,0.14)",
  text:"#FBF7EF", muted:"rgba(251,247,239,0.6)", light:"#121829",
  navBg:"rgba(12,18,37,0.88)",
};
const LIGHT_PALETTE = {
  bg:"#FBF7EF", white:"#FFFFFF", navy:"#060A14", char:"#1A2744", gold:"#C4A265",
  copper:"#8A6A2A", copperL:"#A06A4A", cream:"#F0EDE6", border:"rgba(100,85,50,0.18)",
  text:"#3A3F4B", muted:"#8B90A0", light:"#EEEEE9",
  navBg:"rgba(251,247,239,0.88)",
};

const PEPTIDE_OPTIONS = [
  "BPC-157","TB-500","BPC-157 + TB-500",
  "GHK-Cu","Melanotan 2",
  "CJC-1295 + Ipamorelin","Ipamorelin","Sermorelin",
  "Semaglutide","Tirzepatide","Retatrutide",
  "Epitalon","MOTS-C","SS-31","NAD+ 600mg","NAD+ 300mg",
  "Semax","Selank",
  "Thymosin Alpha-1","KPV",
  "PT-141",
  "Other (specify in notes)",
];

const SPECIALTIES = [
  "Longevity / anti-aging","Aesthetics","Sports / regenerative","Functional / integrative","Endocrinology","Wellness / IV","Other",
];

const VOLUMES = [
  "Pilot order (1-10 pens / month)",
  "Small (10-30 / month)",
  "Mid (30-80 / month)",
  "High (80+ / month)",
  "Not sure yet",
];

const COUNTRIES = ["Portugal","Spain","Germany","France","Italy","Switzerland","Austria","Netherlands","Belgium","Luxembourg","UK","Ireland","Denmark","Sweden","Norway","Finland","Poland","Czechia","Greece","Cyprus","Malta","UAE","Saudi Arabia","USA","Canada","Other"];

function App() {
  const [theme, setTheme] = useState(()=>{try{return localStorage.getItem('aevivo-theme')||'light'}catch(e){return 'light'}});
  useEffect(()=>{try{localStorage.setItem('aevivo-theme',theme)}catch(e){}document.documentElement.dataset.theme=theme;window.__aevivo_theme=theme;},[theme]);
  const C = theme==='dark' ? DARK_PALETTE : LIGHT_PALETTE;
  const toggleTheme = ()=>setTheme(t=>t==='dark'?'light':'dark');

  const [form, setForm] = useState({
    clinic:"", practitioner:"", license:"", country:"", specialty:"",
    volume:"", email:"", phone:"", notes:"",
  });
  const [peptides, setPeptides] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const togglePeptide = (p) => setPeptides(prev => { const next = {...prev}; if (next[p]) delete next[p]; else next[p] = true; return next; });

  const required = ["clinic","practitioner","country","specialty","volume","email"];
  const valid = required.every(k => form[k] && form[k].trim().length > 0) && /\S+@\S+\.\S+/.test(form.email);

  const buildSummary = () => {
    const peptideList = Object.keys(peptides).join(", ") || "(not specified)";
    return [
      `Aevivo Clinical · Practitioner application`,
      ``,
      `Clinic: ${form.clinic}`,
      `Practitioner: ${form.practitioner}`,
      form.license ? `License / registration: ${form.license}` : null,
      `Country: ${form.country}`,
      `Specialty: ${form.specialty}`,
      `Estimated monthly volume: ${form.volume}`,
      `Peptides of interest: ${peptideList}`,
      form.notes ? `Notes: ${form.notes}` : null,
      ``,
      `Email: ${form.email}`,
      form.phone ? `Phone / WhatsApp: ${form.phone}` : null,
    ].filter(Boolean).join("\n");
  };

  const submit = (e) => {
    e.preventDefault();
    if (!valid) return;
    setSubmitted(true);
    try { localStorage.setItem("aevivoClinicalApplication", JSON.stringify({...form, peptides: Object.keys(peptides), ts: new Date().toISOString()})); } catch(err) {}
  };

  const summary = buildSummary();
  const waUrl = `https://wa.me/351934126762?text=${encodeURIComponent(summary)}`;
  const mailtoUrl = `mailto:clinical@aevivolongevity.com?subject=${encodeURIComponent("Aevivo Clinical · Practitioner application · " + (form.clinic||""))}&body=${encodeURIComponent(summary)}`;

  return (
    <div style={{fontFamily:"'Libre Baskerville',Georgia,serif",background:"transparent",color:C.text,minHeight:"100vh",position:"relative",zIndex:2}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
        .s{font-family:'Inter',-apple-system,sans-serif}
        .ruo-bar{position:fixed;top:0;left:0;right:0;z-index:300;padding:11px 16px;background:#060A14;display:flex;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid rgba(196,162,101,0.12)}
        .nb{position:fixed;top:44px;left:0;right:0;z-index:200;backdrop-filter:blur(24px) saturate(1.4);background:${C.navBg};border-bottom:1px solid ${C.border};padding:0 clamp(16px,4vw,48px);height:60px;display:flex;align-items:center;justify-content:space-between}
        .bp{font-family:'Inter',-apple-system,sans-serif;font-weight:600;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;padding:14px 28px;background:${C.gold};color:${C.bg};border:none;border-radius:999px;cursor:pointer;transition:all 0.25s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}
        .bp:hover{background:${C.copperL};transform:translateY(-1px)}
        .bp:disabled{opacity:0.4;cursor:not-allowed;transform:none}
        .bo{font-family:'Inter',-apple-system,sans-serif;font-weight:500;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;padding:14px 28px;background:transparent;color:${C.navy};border:1px solid ${C.border};border-radius:999px;cursor:pointer;transition:all 0.25s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}
        .bo:hover{border-color:${C.gold};color:${C.gold}}
        .field{font-family:'Inter',-apple-system,sans-serif;font-size:14px;padding:13px 16px;background:${C.white};border:1px solid ${C.border};border-radius:12px;color:${C.navy};outline:none;transition:all 0.25s;width:100%}
        .field:focus{border-color:${C.gold}}
        .field::placeholder{color:${C.muted}}
        .label{display:block;font-family:'Inter',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:${C.muted};font-weight:600;margin-bottom:8px}
        .label-req::after{content:" *";color:${C.copperL}}
        .pep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
        .pep-chip{font-family:'Inter',sans-serif;font-size:13px;padding:10px 14px;background:${C.white};border:1px solid ${C.border};border-radius:10px;color:${C.text};cursor:pointer;transition:all 0.18s;text-align:left;display:flex;align-items:center;gap:8px}
        .pep-chip:hover{border-color:${C.copper}}
        .pep-chip.on{border-color:${C.gold};background:rgba(196,162,101,0.1);color:${C.navy};font-weight:500}
        .pep-chip .dot{width:14px;height:14px;border-radius:3px;border:1.4px solid ${C.border};display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:${C.white}}
        .pep-chip.on .dot{border-color:${C.gold};background:${C.gold}}
        .pep-chip.on .dot::after{content:"";width:5px;height:9px;border-right:2px solid ${C.bg};border-bottom:2px solid ${C.bg};transform:translateY(-1px) rotate(45deg)}
        @media(max-width:640px){.grid-2{grid-template-columns:1fr!important}.next-grid{grid-template-columns:1fr!important;gap:14px!important}}
      `}</style>

      <div className="ruo-bar">
        <span className="s" style={{fontSize:12,color:C.gold,fontWeight:600,letterSpacing:2}}>FOR RESEARCH USE ONLY</span>
        <span style={{color:"rgba(196,162,101,0.3)"}}>|</span>
        <span className="s" style={{fontSize:12,color:"rgba(251,247,239,0.6)",letterSpacing:0.3}}>Licensed practitioners only. Not for human consumption.</span>
      </div>

      <nav className="nb">
        <a href="index.html" style={{display:"flex",alignItems:"center",gap:10,textDecoration:"none"}}>
          <div style={{width:28,height:28,border:`1px solid ${C.gold}`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:C.gold,fontFamily:"'Libre Baskerville',serif",fontWeight:700}}>A</div>
          <span className="s" style={{fontSize:13,letterSpacing:"0.32em",textTransform:"uppercase",color:C.navy,fontWeight:400,fontFamily:"'Outfit',sans-serif"}}>Aevivo <span style={{color:C.gold}}>Clinical</span></span>
        </a>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <button onClick={toggleTheme} title={theme==='dark'?'Switch to light':'Switch to dark'} aria-label="Toggle theme" style={{width:34,height:34,borderRadius:"50%",background:"rgba(196,162,101,0.1)",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",padding:0}}>
            {theme==='dark' ? (
              <svg width="15" height="15" viewBox="0 0 24 24" fill={C.gold}><path d="M12 3a9 9 0 11-9 9c0-.46.03-.91.09-1.35A7 7 0 0013.35 2.91C12.91 2.97 12.46 3 12 3z"/></svg>
            ) : (
              <svg width="16" height="16" viewBox="0 0 24 24" fill={C.gold}><circle cx="12" cy="12" r="5"/><path d="M12 2a1 1 0 011 1v2a1 1 0 11-2 0V3a1 1 0 011-1zm0 17a1 1 0 011 1v2a1 1 0 11-2 0v-2a1 1 0 011-1zM4 11a1 1 0 110 2H2a1 1 0 110-2h2zm18 0a1 1 0 110 2h-2a1 1 0 110-2h2zM6.22 4.22a1 1 0 011.42 0l1.41 1.41a1 1 0 11-1.41 1.42L6.22 5.64a1 1 0 010-1.42zm11.14 11.14a1 1 0 011.42 0l1.41 1.41a1 1 0 11-1.41 1.42l-1.42-1.41a1 1 0 010-1.42zM6.22 19.78a1 1 0 010-1.42l1.42-1.41a1 1 0 111.41 1.41l-1.41 1.42a1 1 0 01-1.42 0zM17.36 8.64a1 1 0 010-1.42l1.41-1.41a1 1 0 111.42 1.42l-1.41 1.41a1 1 0 01-1.42 0z"/></svg>
            )}
          </button>
          <a href="index.html" className="s" style={{fontSize:13,color:C.muted,textDecoration:"none",letterSpacing:0.3}}>← Back to home</a>
        </div>
      </nav>

      <main style={{maxWidth:880,margin:"0 auto",padding:"140px clamp(20px,5vw,60px) 100px"}}>
        {!submitted ? (
        <form onSubmit={submit}>
          <div className="s" style={{fontSize:12,letterSpacing:3,textTransform:"uppercase",color:C.gold,marginBottom:14,fontWeight:600}}>Apply · Clinic Access</div>
          <h1 style={{fontSize:"clamp(34px,4.5vw,52px)",color:C.navy,fontWeight:400,lineHeight:1.08,marginBottom:18,fontFamily:"'Libre Baskerville',serif"}}>Apply for verified clinic pricing.</h1>
          <p className="s" style={{fontSize:16,color:C.muted,lineHeight:1.7,fontWeight:300,marginBottom:32,maxWidth:680}}>
            Aevivo Clinical supplies EU-GMP peptide pens and vials to longevity, health and wellness clinics, and licensed practitioners. Tell us about your practice and what you need below; we'll take it from there.
          </p>

          <div style={{padding:"22px 26px",background:C.cream,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:36}}>
            <div className="s" style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.copper,fontWeight:600,marginBottom:14}}>What happens next</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18}} className="next-grid">
              {[
                ["1","Review · 2 business days","We confirm your license or registration and check supply fit. No automated rejection; a human reads every application."],
                ["2","Intro call · 15 minutes","A short call with a co-founder to understand your protocols, volume, and timeline. This is where we share verified pricing and sample COAs."],
                ["3","First order · within 7 days","Once you confirm the quote, we ship from EU stock. No formal MOQ; pilot orders welcome. Recurring supply terms agreed from there."],
              ].map(([n,t,d],i)=>(
                <div key={i}>
                  <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:24,color:C.gold,fontWeight:400,lineHeight:1,marginBottom:10}}>{n}</div>
                  <div className="s" style={{fontSize:13,color:C.navy,fontWeight:600,letterSpacing:0.3,marginBottom:6,lineHeight:1.3}}>{t}</div>
                  <div className="s" style={{fontSize:12.5,color:C.muted,fontWeight:300,lineHeight:1.55}}>{d}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}} className="grid-2">
            <div>
              <label className="label label-req">Clinic / business name</label>
              <input className="field" type="text" value={form.clinic} onChange={e=>set("clinic",e.target.value)} placeholder="e.g. Longevity Lab Lisbon" required/>
            </div>
            <div>
              <label className="label label-req">Practitioner name</label>
              <input className="field" type="text" value={form.practitioner} onChange={e=>set("practitioner",e.target.value)} placeholder="Dr. / first and last name" required/>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}} className="grid-2">
            <div>
              <label className="label">License or registration number</label>
              <input className="field" type="text" value={form.license} onChange={e=>set("license",e.target.value)} placeholder="Medical board / pharmacy / GMC etc."/>
            </div>
            <div>
              <label className="label label-req">Country of practice</label>
              <select className="field" value={form.country} onChange={e=>set("country",e.target.value)} required>
                <option value="">Select country</option>
                {COUNTRIES.map(c=>(<option key={c} value={c}>{c}</option>))}
              </select>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}} className="grid-2">
            <div>
              <label className="label label-req">Specialty</label>
              <select className="field" value={form.specialty} onChange={e=>set("specialty",e.target.value)} required>
                <option value="">Select specialty</option>
                {SPECIALTIES.map(s=>(<option key={s} value={s}>{s}</option>))}
              </select>
            </div>
            <div>
              <label className="label label-req">Estimated monthly volume</label>
              <select className="field" value={form.volume} onChange={e=>set("volume",e.target.value)} required>
                <option value="">Select volume</option>
                {VOLUMES.map(v=>(<option key={v} value={v}>{v}</option>))}
              </select>
            </div>
          </div>

          <div style={{marginBottom:24}}>
            <label className="label">Peptides of interest (select any)</label>
            <div className="pep-grid">
              {PEPTIDE_OPTIONS.map(p=>(
                <div key={p} className={`pep-chip ${peptides[p]?"on":""}`} onClick={()=>togglePeptide(p)}>
                  <span className="dot"/><span>{p}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}} className="grid-2">
            <div>
              <label className="label label-req">Email</label>
              <input className="field" type="email" value={form.email} onChange={e=>set("email",e.target.value)} placeholder="you@clinic.com" required/>
            </div>
            <div>
              <label className="label">Phone / WhatsApp</label>
              <input className="field" type="tel" value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="+351 ..."/>
            </div>
          </div>

          <div style={{marginBottom:30}}>
            <label className="label">Notes (protocols, sourcing constraints, anything we should know)</label>
            <textarea className="field" rows="4" value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="Optional"/>
          </div>

          <div style={{padding:"16px 20px",background:"rgba(196,162,101,0.08)",border:`1px solid ${C.border}`,borderRadius:12,fontFamily:"'Inter',sans-serif",fontSize:12,color:C.muted,fontWeight:400,marginBottom:18,lineHeight:1.6}}>
            All Aevivo materials are For Research Use Only and supplied to licensed practitioners and qualified researchers. Aevivo does not provide medical advice, dosing, or clinical protocols. The receiving practitioner is solely responsible for compounding, prescription, and compliance with local regulation.
          </div>

          <div className="s" style={{fontSize:12,color:C.muted,fontWeight:400,lineHeight:1.6,letterSpacing:0.2,marginBottom:24,padding:"14px 18px",background:C.cream,border:`1px solid ${C.border}`,borderRadius:10}}>
            <span style={{color:C.copper,fontWeight:600,letterSpacing:1.4,textTransform:"uppercase",fontSize:10,marginRight:6}}>Who you're applying to</span>
            GÉNESE SOBRANCEIRA, LDA, doing business as Aevivo Longevity. NIF 519331800. INFARMED-authorised medical device distributor (Cert. N.º 3800/DM/2026). <a href="compliance.html" style={{color:C.gold,textDecoration:"underline",textDecorationColor:"rgba(196,162,101,0.4)"}}>Verify →</a>
          </div>

          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            <button type="submit" className="bp" disabled={!valid} style={{flex:1,minWidth:240}}>Submit application</button>
          </div>
          {!valid && <div className="s" style={{fontSize:12,color:C.muted,marginTop:12}}>Fill the required fields (marked *) to enable submission.</div>}
        </form>
        ) : (
        <div>
          <div className="s" style={{fontSize:12,letterSpacing:3,textTransform:"uppercase",color:C.gold,marginBottom:14,fontWeight:600}}>Step 2 · Send</div>
          <h1 style={{fontSize:"clamp(28px,3.6vw,40px)",color:C.navy,fontWeight:400,lineHeight:1.15,marginBottom:18,fontFamily:"'Libre Baskerville',serif"}}>Send us your application.</h1>
          <p className="s" style={{fontSize:15,color:C.muted,lineHeight:1.7,fontWeight:300,marginBottom:24,maxWidth:680}}>
            Pick the channel that fits your practice. Your details below; either button forwards them to our clinical team. We reply within 2 business days.
          </p>

          <pre className="s" style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",fontSize:13,color:C.text,lineHeight:1.6,fontWeight:300,whiteSpace:"pre-wrap",fontFamily:"'Inter',sans-serif",marginBottom:24,overflowX:"auto"}}>{summary}</pre>

          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
            <a href={waUrl} target="_blank" rel="noopener" className="bp" style={{flex:1,minWidth:240,background:"#25D366",color:"#fff"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347Z"/></svg>
              Send via WhatsApp
            </a>
            <a href={mailtoUrl} className="bo" style={{flex:1,minWidth:240}}>Send by email</a>
          </div>
          <button type="button" onClick={()=>setSubmitted(false)} className="s" style={{background:"transparent",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:0,letterSpacing:0.3}}>← Edit application</button>
        </div>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
var l=document.getElementById('loading');if(l){l.style.opacity='0';setTimeout(function(){l.remove()},400)}
</script>
</body>
</html>
