<canvas id="bgnet" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:1"></canvas>
<script>
(function(){
  const canvas = document.getElementById('bgnet'); if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2); let W, H;
  function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(DPR,DPR);}
  resize(); window.addEventListener('resize', resize);
  const N = Math.max(40, Math.min(140, Math.floor(W * H * 0.00008))); const particles = [];
  for (let i=0;i<N;i++) particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.18,vy:(Math.random()-0.5)*0.18,r:Math.random()*1.3+0.4});
  const maxDist=150,maxDist2=maxDist*maxDist; let mx=-9999,my=-9999;
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  window.addEventListener('mouseleave',()=>{mx=-9999;my=-9999});
  function frame(){
    var isDark = (window.__aevivo_theme || document.documentElement.dataset.theme || 'light') === 'dark';
    var lineRGB = isDark ? '196,162,101' : '12,18,37';
    var dotRGB = isDark ? '214,194,148' : '12,18,37';
    var dotAlpha = isDark ? 0.85 : 0.7;
    var lineMul = isDark ? 1 : 0.9;
    ctx.clearRect(0,0,W,H);
    for(const p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;if(p.y<-20)p.y=H+20;if(p.y>H+20)p.y=-20;}
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d2=dx*dx+dy*dy;
        if(d2<maxDist2){const d=Math.sqrt(d2),a=0.28*(1-d/maxDist)*lineMul;ctx.strokeStyle='rgba('+lineRGB+','+a+')';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}
      }
      const mdx=particles[i].x-mx,mdy=particles[i].y-my,md2=mdx*mdx+mdy*mdy;
      if(md2<32400){const md=Math.sqrt(md2),a=0.25*(1-md/180)*lineMul;ctx.strokeStyle='rgba('+lineRGB+','+a+')';ctx.lineWidth=0.6;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(mx,my);ctx.stroke();}
    }
    for(const p of particles){ctx.fillStyle='rgba('+dotRGB+','+dotAlpha+')';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

        </div>
      </nav>

      <main style={{maxWidth:1020,margin:"0 auto",padding:"140px clamp(20px,5vw,60px) 140px"}}>
        <form onSubmit={complete}>
          <div className="s" style={{fontSize:12,letterSpacing:3,textTransform:"uppercase",color:C.gold,marginBottom:14,fontWeight:600}}>Order · Compound Selection</div>

          </p>

          <div style={{marginBottom:32,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            <span style={{display:"inline-block",padding:"6px 14px",fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:600,letterSpacing:2,textTransform:"uppercase",color:C.gold,border:`1px solid ${C.border}`,borderRadius:999,background:"rgba(196,162,101,0.06)"}}>VAT included</span>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:36}}>
            <input required type="text" placeholder="Full name" className="email-input" value={name} onChange={e=>setName(e.target.value)}/>
            <input required type="email" placeholder="Email" className="email-input" value={email} onChange={e=>setEmail(e.target.value)}/>
          </div>

          {catalog.map((sec, ci) => (
            <div key={ci} style={{marginBottom:34}}>
              <h2 style={{fontSize:"clamp(20px,2vw,26px)",color:C.navy,fontWeight:400,marginBottom:6,fontFamily:"'Libre Baskerville',serif"}}>{sec.cat}<span className="s" style={{color:C.muted,fontSize:"0.55em",marginLeft:12,fontWeight:400,letterSpacing:0.5}}>{sec.items.length} compound{sec.items.length>1?"s":""}</span></h2>
              <div className="cat-prices-header">
                <span>Compound</span>
                <span style={{position:"relative"}}><span className="ff-col-badge">Founder's · Until June</span>Founder's Price</span>
                <span>Retail Price</span>
                <span>Quantity</span>
              </div>
              {sec.items.map((item, ii) => {
                const q = qty[item.n] || 0;
                const on = q > 0;
                const displayName = item.display || item.n;
                return (
                  <div key={ii} className={`crow ${on?"on":""}`}>
                    <div>
                      <div style={{fontSize:18,color:C.navy,fontWeight:500,lineHeight:1.25}}>{displayName}</div>
                      <div className="s" style={{fontSize:12,color:C.muted,marginTop:4,letterSpacing:0.2}}>{item.sp}</div>
                      {item.ds&&<div className="s" style={{fontSize:13,color:"rgba(251,247,239,0.7)",marginTop:8,lineHeight:1.55,fontWeight:300,maxWidth:520}}>{item.ds}</div>}
                    </div>
                    <div className="price-cell">
                      <div className="price-ff">€{item.pf}</div>
                      <div className="s" style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:C.gold,marginTop:4,fontWeight:600,opacity:0.75,fontFamily:"'Inter',sans-serif"}}>Founder's</div>
                    </div>
                    <div className="price-cell">
                      <div className="price-retail">€{item.pr}</div>
                      <div className="s" style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginTop:4,fontWeight:500,opacity:0.6,fontFamily:"'Inter',sans-serif"}}>Retail</div>
                    </div>
                    <div className={`qty-ctrl ${on?"on":""}`}>
                      <button type="button" className="qty-btn" onClick={()=>dec(item.n)} disabled={q===0} aria-label="Decrease">−</button>
                      <input type="number" min="0" max="10000" value={q} onChange={e=>{const v=e.target.value;setQ(item.n,v===""?0:parseInt(v)||0)}} className={`qty-val ${on?"":"zero"}`} onClick={e=>e.target.select()}/>
                      <button type="button" className="qty-btn" onClick={()=>inc(item.n)} aria-label="Increase">+</button>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}

          <div style={{marginTop:36,padding:"32px 28px",background:"rgba(196,162,101,0.08)",border:`1px solid rgba(196,162,101,0.3)`,borderRadius:16,textAlign:"center"}}>
            <div className="s" style={{fontSize:11,letterSpacing:2.5,textTransform:"uppercase",color:C.gold,fontWeight:600,marginBottom:10}}>Can't find what you need?</div>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"clamp(22px,2.5vw,28px)",color:C.navy,fontWeight:400,marginBottom:10,lineHeight:1.2}}>Looking for other peptides? <em style={{color:C.gold,fontStyle:"italic"}}>We probably have them.</em></h3>
            <p className="s" style={{fontSize:15,color:C.muted,fontWeight:300,marginBottom:22,maxWidth:560,marginLeft:"auto",marginRight:"auto",lineHeight:1.65}}>Tell us what you\'re looking for. If it exists in European GMP supply, we can source it for you.</p>
            <a href="https://wa.me/4915126628914?text=Hi%20Aevivo%2C%20I%27m%20looking%20for%20a%20specific%20peptide.%20Can%20you%20help%3F" target="_blank" rel="noopener" className="bp" style={{display:"inline-flex",alignItems:"center",gap:10,padding:"14px 32px",textDecoration:"none"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.6.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.3-1.5-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.2-.5.1-.2 0-.4 0-.5-.1-.1-.6-1.4-.8-1.9-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.4.1-.6.3-.2.2-.8.8-.8 2s.8 2.3.9 2.4c.1.2 1.6 2.5 4 3.5.5.2 1 .4 1.3.5.6.2 1.1.2 1.5.1.5-.1 1.4-.6 1.7-1.1.2-.6.2-1 .1-1.1-.1-.1-.3-.2-.6-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.4c1.4.8 3 1.2 4.7 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
              Send a request
            </a>
          </div>

          <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"16px clamp(20px,5vw,60px)",background:"rgba(6,10,20,0.96)",backdropFilter:"blur(16px)",borderTop:`1px solid ${C.border}`,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
            <div>
              <div className="s" style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:C.gold,fontWeight:600}}>Your selection</div>
              <div className="s" style={{fontSize:14,color:C.navy,fontWeight:500,marginTop:3}}>
                {selectedCount === 0 ? "Nothing selected yet" : hasOverLimit ? (
                  <span style={{color:C.gold}}>Over 500 units on {overLimit.length} compound{overLimit.length>1?"s":""}. Contact us for volume pricing.</span>
                ) : (
                  <>{selectedCount} compound{selectedCount>1?"s":""} · {totalPens} pen{totalPens>1?"s":""} · <strong style={{color:C.gold,fontFamily:"'Libre Baskerville',serif",fontSize:17,fontWeight:400}}>€{totalFF}</strong> <span style={{fontSize:12,color:C.muted,textDecoration:"line-through",marginLeft:6}}>€{totalRetail}</span> <span style={{fontSize:11,color:C.muted,marginLeft:10,opacity:0.75}}>VAT incl.</span></>
                )}
              </div>
            </div>
            {hasOverLimit ? (
              <a href={whatsappUrl()} target="_blank" rel="noopener" className="bp" style={{padding:"14px 32px",display:"inline-flex",alignItems:"center",gap:10,textDecoration:"none"}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.6.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.3-1.5-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.2-.5.1-.2 0-.4 0-.5-.1-.1-.6-1.4-.8-1.9-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.4.1-.6.3-.2.2-.8.8-.8 2s.8 2.3.9 2.4c.1.2 1.6 2.5 4 3.5.5.2 1 .4 1.3.5.6.2 1.1.2 1.5.1.5-.1 1.4-.6 1.7-1.1.2-.6.2-1 .1-1.1-.1-.1-.3-.2-.6-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.4c1.4.8 3 1.2 4.7 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
                Contact us
              </a>
            ) : (
              <button type="submit" className="bp" disabled={selectedCount===0 || !email} style={{padding:"14px 32px"}}>Complete selection →</button>
            )}
          </div>
        </form>
      </main>
    </div>
  );
}
