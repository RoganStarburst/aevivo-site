<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Discover Your Optimized Health · Aevivo Longevity</title>
<meta name="description" content="A two-minute quiz to map where your health is today and where the biggest gains are. Then book a free consultation with the doctor.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23F8F5EE'/><text x='50%25' y='58%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-family='Georgia' fill='%232C2D27' font-weight='600'>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/theme.css?v=4">
<!--
  PHASE 1 QUIZ. Self-contained, no backend required to run.
  Flow: 5 questions -> contact -> preferred contact -> postcode -> marketing opt-in -> success (book).

  REPLACE_ME (BOOKING-LINK): set BOOKING_URL below to Andrea's Google Appointment
  Scheduling link. The success screen routes there; Google captures the booking.

  OPTIONAL (QUIZ_ENDPOINT): set to a Formspree / MailerLite / Apps Script POST URL to
  capture every quiz lead (answers + contact). If empty, the quiz still works, saves to
  the visitor's localStorage, and offers a prefilled email fallback.

  Team photo on the contact step: drop an image at ../../images/aevivo-team.jpg and
  swap the .quiz-photo placeholder (see comment in renderContact).
-->
<style>
  body { background: var(--bg); }
  .quiz-shell { min-height: 100vh; display: flex; flex-direction: column; }

  .quiz-top { padding: 22px 0; border-bottom: 1px solid var(--line-soft); }
  .quiz-top .quiz-top-inner { display: flex; align-items: center; justify-content: space-between; }
  .quiz-brand { display: inline-flex; align-items: center; gap: 11px; }
  .quiz-brand .brand-mark {
    width: 34px; height: 34px; border: 1px solid var(--ink); border-radius: 7px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 19px; color: var(--ink);
  }
  .quiz-brand .brand-name { font-size: 13px; letter-spacing: 4px; font-weight: 500; color: var(--ink); }
  .quiz-exit { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-mute); font-weight: 500; }
  .quiz-exit:hover { color: var(--ink); }

  .quiz-progress { height: 3px; background: var(--line-soft); }
  .quiz-progress-bar { height: 100%; background: var(--olive); width: 0; transition: width .4s ease; }

  .quiz-stage { flex: 1; display: flex; align-items: center; }
  .quiz-card { max-width: 720px; margin: 0 auto; width: 100%; padding: 56px 0 80px; }
  .quiz-step-label { display: block; text-align: center; font-size: 10.5px; letter-spacing: 3px; text-transform: uppercase; color: var(--olive); font-weight: 600; margin-bottom: 22px; }
  .quiz-q {
    font-family: var(--serif); font-weight: 400; color: var(--ink);
    font-size: clamp(30px, 4.4vw, 50px); line-height: 1.12; text-align: center;
    max-width: 16ch; margin: 0 auto 14px;
  }
  .quiz-q em { font-style: italic; color: var(--olive); }
  .quiz-sub { text-align: center; max-width: 30rem; margin: 0 auto 40px; color: var(--ink-soft); font-size: 15px; line-height: 1.6; }
  .quiz-q.tight { margin-bottom: 40px; }

  .options { display: flex; flex-direction: column; gap: 12px; max-width: 560px; margin: 0 auto; }
  .option {
    display: flex; align-items: center; gap: 16px; width: 100%; text-align: left;
    padding: 18px 22px; background: #FFFFFF; border: 1px solid var(--line);
    border-radius: 12px; cursor: pointer; font-family: var(--sans);
    font-size: 16px; color: var(--ink-soft); transition: all .2s ease;
  }
  .option:hover { border-color: var(--olive); color: var(--ink); }
  .option.selected { border-color: var(--olive); background: var(--olive-tint); color: var(--ink); }
  .opt-key {
    flex: 0 0 auto; width: 28px; height: 28px; border: 1px solid var(--line);
    border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--ink-soft); background: var(--bg); transition: all .2s ease;
  }
  .option.selected .opt-key { background: var(--olive); border-color: var(--olive); color: #F5F1E4; }
  .opt-label b { font-weight: 600; color: var(--ink); }

  .quiz-form { max-width: 560px; margin: 0 auto; }
  .quiz-form .form-row.two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 560px) { .quiz-form .form-row.two { grid-template-columns: 1fr; } }
  .quiz-photo {
    max-width: 560px; margin: 0 auto 32px; aspect-ratio: 16 / 7; border-radius: 14px; border: 1px solid var(--line);
    background: linear-gradient(150deg, #565A45, #44483A 70%, #3F4231);
    display: flex; align-items: center; justify-content: center;
    color: rgba(245,241,228,0.85); font-family: var(--serif); font-style: italic; font-size: 20px;
  }
  .text-input-wrap { max-width: 460px; margin: 0 auto; }
  .consent-row { display: flex; gap: 11px; align-items: flex-start; margin-top: 14px; font-size: 13px; color: var(--ink-soft); line-height: 1.55; }
  .consent-row input { margin-top: 3px; accent-color: var(--olive); }
  .consent-row a { color: var(--olive); border-bottom: 1px solid var(--olive); }

  .quiz-actions { display: flex; flex-direction: column; align-items: center; gap: 18px; margin-top: 40px; }
  .quiz-back { background: none; border: none; cursor: pointer; font-family: var(--sans); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-mute); }
  .quiz-back:hover { color: var(--ink); }
  .quiz-back[hidden] { display: none; }
  .btn[disabled] { opacity: .4; pointer-events: none; }

  .quiz-success { max-width: 600px; margin: 0 auto; text-align: center; padding: 40px 0; }
  .quiz-success h1 { font-size: clamp(36px, 5vw, 60px); margin-bottom: 20px; }
  .quiz-success .lede { color: var(--ink-soft); margin-bottom: 36px; }
  .quiz-success .fallback { margin-top: 22px; font-size: 12.5px; color: var(--ink-mute); }
  .quiz-success .fallback a { color: var(--olive); border-bottom: 1px solid var(--olive); }
</style>
</head>
<body>

<div class="quiz-shell">
  <div class="quiz-top">
    <div class="container quiz-top-inner">
      <a href="../" class="quiz-brand" aria-label="Aevivo Longevity">
        <span class="brand-mark">A</span>
        <span class="brand-name">AEVIVO LONGEVITY</span>
      </a>
      <a href="../" class="quiz-exit">Exit</a>
    </div>
  </div>
  <div class="quiz-progress"><div class="quiz-progress-bar" id="progressBar"></div></div>

  <div class="quiz-stage">
    <div class="container">
      <div class="quiz-card" id="quizCard"><!-- rendered by JS --></div>
    </div>
  </div>
</div>

<script>
  // ===== CONFIG =====
  var BOOKING_URL = '#REPLACE_BOOKING_URL'; // REPLACE_ME: Andrea's Google Appointment Scheduling link
  var QUIZ_ENDPOINT = '';                   // OPTIONAL: Formspree / MailerLite / Apps Script POST URL
  var TEAM_EMAIL = 'info@aevivolongevity.com';

  // ===== FLOW =====
  var flow = [
    { type: 'choice', id: 'returning', q: 'Are you new to <em>Aevivo?</em>', options: [
      { k: 'A', label: 'First time here' },
      { k: 'B', label: "I'm back for more" }
    ]},
    { type: 'choice', id: 'goal', q: 'What is your <em>#1 health goal</em> right now?', options: [
      { k: 'A', label: 'Boost my daily energy and focus' },
      { k: 'B', label: 'Slow ageing and future-proof my health' },
      { k: 'C', label: 'Improve digestion and gut health' },
      { k: 'D', label: 'Upgrade performance and recovery' },
      { k: 'E', label: 'Reset hormones and balance mood' },
      { k: 'F', label: 'Look and feel more confident' }
    ]},
    { type: 'choice', id: 'tried', multi: true, sub: 'Select all that apply.', q: 'How have you tried to improve your health <em>so far?</em>', options: [
      { k: 'A', label: 'Supplements or detox programmes' },
      { k: 'B', label: 'My GP or a private health check-up' },
      { k: 'C', label: 'Diet and fitness routines' },
      { k: 'D', label: 'Biohacking or longevity treatments' },
      { k: 'E', label: 'Nothing consistent yet' }
    ]},
    { type: 'choice', id: 'feel', multi: true, sub: 'Select all that apply.', q: 'What do you want to <em>feel more of?</em>', options: [
      { k: 'A', label: 'Clarity and focus' },
      { k: 'B', label: 'Energy and drive' },
      { k: 'C', label: 'Calm and balance' },
      { k: 'D', label: 'Confidence and strength' },
      { k: 'E', label: 'Motivation and purpose' }
    ]},
    { type: 'choice', id: 'lifestyle', q: 'What best describes <em>your lifestyle?</em>', options: [
      { k: 'A', label: '<b>Always on the go</b> - time poor, performance driven' },
      { k: 'B', label: '<b>Balanced</b> - I make time for my health but could improve' },
      { k: 'C', label: '<b>Reactive</b> - I focus on my health only when something feels off' }
    ]},
    { type: 'contact', id: 'contact', q: "Let's get you <em>connected.</em>",
      sub: 'Share your details so we can send your results and match you with the right part of the team.' },
    { type: 'choice', id: 'method', q: 'Your preferred <em>method of contact?</em>', options: [
      { k: 'A', label: 'WhatsApp' },
      { k: 'B', label: 'Book online' },
      { k: 'C', label: 'Phone call' },
      { k: 'D', label: 'Email' }
    ]},
    { type: 'text', id: 'postcode', q: 'What is your <em>postcode?</em>',
      sub: 'We work online worldwide. This just helps us understand where our patients are.', placeholder: 'Your postcode' },
    { type: 'choice', id: 'marketing', q: "Want early access to <em>what's next?</em>",
      sub: 'Be first to hear about new programmes, member events, and health insights from Aevivo. Optional, and you can opt out any time.',
      marketing: true, options: [
        { k: 'A', label: 'Yes, keep me posted' },
        { k: 'B', label: 'No thanks' }
      ]}
  ];

  var TOTAL = flow.length;
  var current = 0;
  var answers = {};
  var contact = {};

  var card = document.getElementById('quizCard');
  var bar = document.getElementById('progressBar');

  function setProgress() { bar.style.width = Math.round((current / TOTAL) * 100) + '%'; }
  function esc(s) { return String(s).replace(/"/g, '&quot;'); }
  function questionNumber(i) {
    // count choice/text questions up to and including i (skip contact in the count)
    var n = 0; for (var j = 0; j <= i; j++) { if (flow[j].type !== 'contact') n++; }
    return n;
  }
  function totalQuestions() { return flow.filter(function (s) { return s.type !== 'contact'; }).length; }

  function actionsHtml(continueLabel, enabled, showBack) {
    return '<div class="quiz-actions">' +
      '<button type="button" class="btn btn-fill" id="nextBtn"' + (enabled ? '' : ' disabled') + '>' + continueLabel + '</button>' +
      '<button type="button" class="quiz-back"' + (showBack ? '' : ' hidden') + ' id="backBtn">&larr; Back</button>' +
    '</div>';
  }
  function wireBack() { var b = document.getElementById('backBtn'); if (b) b.addEventListener('click', function () { current--; render(); }); }
  function advance() { if (current === TOTAL - 1) finish(); else { current++; render(); } }

  function renderChoice(step, i) {
    var multi = !!step.multi;
    var chosen = answers[step.id] || (multi ? [] : null);
    var hasSel = multi ? chosen.length > 0 : !!chosen;
    var html = '';
    html += '<span class="quiz-step-label">' + (step.marketing ? 'One last thing' : 'Question ' + questionNumber(i) + ' of ' + totalQuestions()) + '</span>';
    html += '<h2 class="quiz-q' + (step.sub ? '' : ' tight') + '">' + step.q + '</h2>';
    if (step.sub) html += '<p class="quiz-sub">' + step.sub + '</p>';
    html += '<div class="options">';
    step.options.forEach(function (o) {
      var isSel = multi ? chosen.indexOf(o.label) !== -1 : chosen === o.label;
      html += '<button type="button" class="option' + (isSel ? ' selected' : '') + '" data-label="' + esc(o.label) + '"><span class="opt-key">' + o.k + '</span><span class="opt-label">' + o.label + '</span></button>';
    });
    html += '</div>';
    html += actionsHtml('Continue', hasSel, i > 0);
    card.innerHTML = html;
    setProgress();
    card.querySelectorAll('.option').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var label = btn.getAttribute('data-label');
        var nb = document.getElementById('nextBtn');
        if (multi) {
          var arr = answers[step.id] || [];
          var idx = arr.indexOf(label);
          if (idx === -1) arr.push(label); else arr.splice(idx, 1);
          answers[step.id] = arr;
          btn.classList.toggle('selected');
          if (arr.length) nb.removeAttribute('disabled'); else nb.setAttribute('disabled', '');
        } else {
          answers[step.id] = label;
          card.querySelectorAll('.option').forEach(function (b) { b.classList.remove('selected'); });
          btn.classList.add('selected');
          nb.removeAttribute('disabled');
        }
      });
    });
    document.getElementById('nextBtn').addEventListener('click', function () {
      var a = answers[step.id];
      if (multi ? (a && a.length) : !!a) advance();
    });
    wireBack();
  }

  function renderText(step, i) {
    var val = answers[step.id] || '';
    var html = '';
    html += '<span class="quiz-step-label">Question ' + questionNumber(i) + ' of ' + totalQuestions() + '</span>';
    html += '<h2 class="quiz-q' + (step.sub ? '' : ' tight') + '">' + step.q + '</h2>';
    if (step.sub) html += '<p class="quiz-sub">' + step.sub + '</p>';
    html += '<div class="text-input-wrap"><input class="form-input" id="textIn" type="text" value="' + esc(val) + '" placeholder="' + esc(step.placeholder || '') + '"></div>';
    html += actionsHtml('Continue', !!val.trim(), i > 0);
    card.innerHTML = html;
    setProgress();
    var input = document.getElementById('textIn');
    input.addEventListener('input', function () {
      answers[step.id] = input.value;
      var nb = document.getElementById('nextBtn');
      if (input.value.trim()) nb.removeAttribute('disabled'); else nb.setAttribute('disabled', '');
    });
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter' && input.value.trim()) advance(); });
    document.getElementById('nextBtn').addEventListener('click', function () { if (input.value.trim()) advance(); });
    wireBack();
    input.focus();
  }

  function renderContact(step, i) {
    var html = '';
    html += '<span class="quiz-step-label">Almost there</span>';
    html += '<h2 class="quiz-q tight">' + step.q + '</h2>';
    /*
      REPLACE_ME: swap the placeholder below for a real team photo:
      <img class="quiz-photo" src="../../images/aevivo-team.jpg" alt="The Aevivo team" style="object-fit:cover;">
    */
    html += '<div class="quiz-photo">The Aevivo care team</div>';
    if (step.sub) html += '<p class="quiz-sub">' + step.sub + '</p>';
    html += '<form class="quiz-form" id="contactForm" autocomplete="on">';
    html += '<div class="form-row two">' +
              '<div><label class="form-label" for="first">First name</label><input class="form-input" id="first" name="first" type="text" required value="' + esc(contact.first || '') + '" placeholder="First name"></div>' +
              '<div><label class="form-label" for="last">Last name</label><input class="form-input" id="last" name="last" type="text" required value="' + esc(contact.last || '') + '" placeholder="Last name"></div>' +
            '</div>';
    html += '<div class="form-row"><label class="form-label" for="email">Email</label><input class="form-input" id="email" name="email" type="email" required value="' + esc(contact.email || '') + '" placeholder="you@email.com"></div>';
    html += '<div class="form-row"><label class="form-label" for="phone">Phone / WhatsApp</label><input class="form-input" id="phone" name="phone" type="tel" required value="' + esc(contact.phone || '') + '" placeholder="+351 ..."></div>';
    html += '<label class="consent-row"><input type="checkbox" id="consent" required> I agree to be contacted about my consultation and accept the <a href="../../privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.</label>';
    html += actionsHtml('Continue', true, i > 0).replace('id="nextBtn"', 'id="nextBtn" form="contactForm" type="submit"');
    html += '</form>';
    card.innerHTML = html;
    setProgress();
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      contact.first = document.getElementById('first').value.trim();
      contact.last = document.getElementById('last').value.trim();
      contact.email = document.getElementById('email').value.trim();
      contact.phone = document.getElementById('phone').value.trim();
      advance();
    });
    wireBack();
  }

  function buildSummary() {
    var lines = ['Aevivo Longevity - Health quiz', ''];
    lines.push('Name: ' + (contact.first || '') + ' ' + (contact.last || ''));
    lines.push('Email: ' + (contact.email || ''));
    lines.push('Phone: ' + (contact.phone || ''));
    lines.push('Postcode: ' + (answers.postcode || ''));
    lines.push('Preferred contact: ' + (answers.method || ''));
    lines.push('Marketing opt-in: ' + (contact.marketing ? 'yes' : 'no'));
    lines.push('');
    flow.forEach(function (s) {
      if (s.type === 'choice' && !s.marketing) {
        var a = answers[s.id];
        if (Array.isArray(a)) a = a.length ? a.join(', ') : '';
        lines.push(s.q.replace(/<[^>]+>/g, '') + ' -> ' + (a || '(skipped)'));
      }
    });
    return lines.join('\n');
  }

  function finish() {
    contact.marketing = answers.marketing && /yes/i.test(answers.marketing);
    var payload = { contact: contact, answers: answers, ts: new Date().toISOString() };
    try { localStorage.setItem('aevivoHealthQuiz', JSON.stringify(payload)); } catch (e) {}
    if (QUIZ_ENDPOINT) {
      fetch(QUIZ_ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(function () {});
    }
    renderSuccess();
  }

  function renderSuccess() {
    bar.style.width = '100%';
    var summary = buildSummary();
    var mailto = 'mailto:' + TEAM_EMAIL + '?subject=' + encodeURIComponent('Aevivo health quiz - ' + (contact.first || '') + ' ' + (contact.last || '')) + '&body=' + encodeURIComponent(summary);
    var html = '<div class="quiz-success">';
    html += '<span class="quiz-step-label">All done</span>';
    html += '<h1>You are ready to start, ' + (contact.first || 'there') + '.</h1>';
    html += '<p class="lede">The last step is the most important one: a free 15-minute consultation with the doctor. She reads where you are, listens to your story, and tells you exactly what she would do next, the tests, the protocol, or the therapy that fits you.</p>';
    html += '<a href="' + BOOKING_URL + '" class="btn btn-fill" id="bookBtn">Schedule your free consultation</a>';
    if (!QUIZ_ENDPOINT) { html += '<p class="fallback">Prefer email? <a href="' + mailto + '">Send us your answers</a>.</p>'; }
    html += '</div>';
    card.innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function render() {
    if (current < 0) current = 0;
    if (current >= TOTAL) { finish(); return; }
    var step = flow[current];
    if (step.type === 'choice') renderChoice(step, current);
    else if (step.type === 'text') renderText(step, current);
    else if (step.type === 'contact') renderContact(step, current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  render();
</script>
</body>
</html>
