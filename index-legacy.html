            {q:"Do you provide Certificates of Analysis?",a:"For every compound in our catalog, we hold a representative Certificate of Analysis on record, including HPLC purity chromatogram, mass spectrometry data confirming molecular weight and sequence identity, physical appearance, and recommended storage conditions. Certificates are shared during the reservation process."},
            {q:"What is the pen format?",a:"Our pre-filled pen system uses sealed cartridges with dial-based dosing. This eliminates reconstitution variables, reduces contamination risk from repeated septum puncture, and enables precise, repeatable dispensing for research protocols."},
            {q:"How do I reserve from a batch cycle?",a:"Submit the Pre-order form with the compounds you're interested in, your role, and your contact details. A member of our team reviews every reservation and follows up within 24 hours to confirm compound, quantity, pricing, and expected shipping window. A reservation becomes a binding order only when both sides confirm in writing."},
            {q:"Why don't you show prices publicly?",a:"We produce in limited European batch cycles, and production cost varies with compound, quantity, and batch size. Pricing is quoted individually at the point of reservation so we can be accurate rather than approximate. If you want a ballpark figure before reserving, ask us directly."},
            {q:"How long does fulfilment take?",a:"From close of a batch cycle to delivery at your address typically runs five to fourteen business days, depending on production timing, customs, and carrier. We provide an estimated window at the time of order confirmation."},
            {q:"How are products shipped and stored?",a:"Peptides ship in sealed pen cartridges under inert atmosphere, with temperature-controlled packaging where required. Storage conditions are specified on each product's Certificate of Analysis and in your order documentation. Most compounds are stable at 2-8°C refrigerated."},
            {q:"Do you ship outside the European Union?",a:"EU shipping is our default. International shipping is handled case by case depending on destination regulations and compound classification. Let us know your destination at the time of reservation and we will confirm whether we can serve it."},
            {q:"Do you offer wholesale arrangements?",a:"Volume arrangements are available case by case for clinics, laboratories, and pharmacies. Reach out with your context, intended volumes, and timelines, and we will come back with a proposal."},
            {q:"What if my shipment arrives damaged or does not match?",a:"Inspect every package on arrival. Any visible damage, temperature excursion evidence, or documentation discrepancy must be reported within 72 hours of delivery. Confirmed issues are resolved by replacement or refund. All sales are otherwise final once shipped. Full terms are in our Terms of Service."},
          ].map((f,i)=>(
            <F key={i} d={i*0.04}><div style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setFaqOpen(faqOpen===i?-1:i)}>

                <h3 className="s" style={{fontSize:15,color:faqOpen===i?C.copper:C.navy,fontWeight:600,transition:"color 0.2s"}}>{f.q}</h3>

            </div></F>
          ))}
        </div>

            </div>
            {[

            All products sold by Aevivo are intended exclusively for laboratory research use only (RUO). These products are not drugs, dietary supplements, food additives, or cosmetics. They are not intended for human or animal consumption, clinical, diagnostic, therapeutic, or veterinary use. No products have been approved, evaluated, or reviewed by the FDA, EMA, or any regulatory body. No statements on this website constitute medical claims or imply suitability for any non-research purpose. By purchasing from Aevivo, the buyer represents and warrants that they are a qualified researcher or institution and agrees to use all products exclusively for lawful in vitro research purposes. Aevivo assumes no liability for any misuse or damages arising from product use outside of labeled research applications. All sales are final. Products may not be resold for human consumption under any circumstances.
          </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>

          </div>
        </div>
      </footer>

      {/* ── MODALS ── */}
      {modal&&(
        <div onClick={closeModal} style={{position:"fixed",inset:0,background:"rgba(11,15,26,0.55)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeUp 0.2s ease",overflowY:"auto"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.white,maxWidth:480,width:"100%",padding:"44px 40px",position:"relative",border:`1px solid ${C.border}`,boxShadow:"0 24px 80px rgba(11,15,26,0.18)"}}>
            <span onClick={closeModal} style={{position:"absolute",top:12,right:18,cursor:"pointer",color:C.muted,fontSize:26,lineHeight:1,userSelect:"none"}}>×</span>
            {submitted?(
              <div style={{textAlign:"center",padding:"10px 0"}}>
                <div className="s" style={{fontSize:12,letterSpacing:3,textTransform:"uppercase",color:C.copper,marginBottom:14,fontWeight:500}}>Received</div>
                <h3 style={{fontSize:24,color:C.navy,fontWeight:400,lineHeight:1.25,marginBottom:14}}>
                  {modal==="guide"?"Your guide is on the way.":"We'll be in touch within 24 hours."}
                </h3>
                <p className="s" style={{fontSize:15,color:C.muted,lineHeight:1.6,fontWeight:300}}>
                  {modal==="guide"?"Check your inbox. If you don't see it, check spam or write to info@aevivolongevity.com.":"We produce in European batch cycles. A member of our team will confirm your reservation, pricing, and timing."}
                </p>
              </div>
            ):modal==="guide"?(
              <form onSubmit={async e=>{e.preventDefault();const el=e.target;await submitToMailerLite(el,"185461941596062883");setSubmitted(true)}}>
                <div className="s" style={{fontSize:12,letterSpacing:3,textTransform:"uppercase",color:C.copper,marginBottom:10,fontWeight:500}}>Free Download</div>
                <h3 style={{fontSize:26,color:C.navy,fontWeight:400,lineHeight:1.2,marginBottom:10}}>The Buyer's Decision Guide.</h3>
                <p className="s" style={{fontSize:15,color:C.muted,lineHeight:1.65,fontWeight:300,marginBottom:22}}>What to look for before buying peptides from anyone. Purity, provenance, documentation, delivery format, and the red flags most suppliers hope you'll miss.</p>
                <input required name="name" type="text" placeholder="First name" className="email-input" style={{width:"100%",marginBottom:10}}/>
                <input required name="email" type="email" placeholder="Your email" className="email-input" style={{width:"100%",marginBottom:18}}/>
                <button type="submit" className="bp" style={{width:"100%",padding:"14px",fontSize:13}}>Send Me the Guide</button>
                <div className="s" style={{fontSize:11,color:C.muted,marginTop:10,textAlign:"center"}}>No spam. Unsubscribe anytime.</div>
              </form>
            ):(
              <form onSubmit={async e=>{e.preventDefault();const el=e.target;const d=new FormData(el);const email=d.get("email")||"";const name=d.get("name")||"";const phone=d.get("phone")||"";const tax=d.get("tax")||"";try{sessionStorage.setItem("aevivoLead",JSON.stringify({name,email,phone,tax}))}catch(err){}await submitToMailerLite(el,"185461944980866798",{peptide:reservePeptide?reservePeptide.n:null});window.location.href="orderlist.html?email="+encodeURIComponent(email)+"&name="+encodeURIComponent(name)+(reservePeptide?"&peptide="+encodeURIComponent(reservePeptide.n):"")}}>

                  {reservePeptide?`${reservePeptide.n}.`:"Order your peptides."}

                <p className="s" style={{fontSize:15,color:C.muted,lineHeight:1.65,fontWeight:300,marginBottom:22}}>We produce in limited European batch cycles. Leave your details and we'll send you everything you need next.</p>
                <input required name="name" type="text" placeholder="Full name" className="email-input" style={{width:"100%",marginBottom:10}}/>

                <input required name="phone" type="tel" placeholder="Phone (with country code)" className="email-input" style={{width:"100%",marginBottom:10}}/>
                <div style={{padding:"12px 14px",background:C.cream,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:18}}>
                  <div className="s" style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.copper,fontWeight:600,marginBottom:6}}>What happens next</div>
