  if (tagIds.includes("tlr-th1") && experience === "experienced") offList.push("tlr-th1-deep");

  const routeToCall = picked.length === 0;

  return {picked, offList, routeToCall, selectedTags: tags, uncoveredSuggestions};
}

function primaryTagLabel(tagId){
  const t = TAGS.find(x=>x.id===tagId);
  return t ? t.label : tagId;
}

            <div style={{marginBottom:28}}>
              <label className="s" style={{display:"block",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:8,fontWeight:600}}>
                Anything you'd like us to know before a Concierge Call? <span style={{color:C.muted,fontWeight:400,textTransform:"none",letterSpacing:0.3}}>(optional)</span>
              </label>
              <textarea
                placeholder="e.g. what drew you to these research areas, specific questions you have, context that would help us prepare."
                className="email-input"
                value={note}
                onChange={e=>setNote(e.target.value.slice(0,500))}
                maxLength={500}
                rows={3}
                style={{resize:"vertical",minHeight:80,fontFamily:"'Inter',-apple-system,sans-serif"}}
              />
              <div className="s" style={{fontSize:11,color:C.muted,marginTop:4,textAlign:"right"}}>{note.length}/500</div>
            </div>

            <div style={{padding:"18px 20px",border:`1px solid ${C.border}`,borderRadius:12,background:C.white,marginBottom:28}}>
              <label className="consent-row"><input type="checkbox" checked={consentAge} onChange={e=>setConsentAge(e.target.checked)}/><span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}>I am 18 years or older.</span></label>
              <label className="consent-row"><input type="checkbox" checked={consentRUO} onChange={e=>setConsentRUO(e.target.checked)}/><span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}>I am acquiring Aevivo products for research purposes only, not for human consumption, and not for resale to consumers.</span></label>
              <label className="consent-row"><input type="checkbox" checked={consentEdu} onChange={e=>setConsentEdu(e.target.checked)}/><span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}>I understand these products have not been evaluated by any medical regulatory authority for human use, and this tool is educational, not medical advice.</span></label>
              <label className="consent-row"><input type="checkbox" checked={consentGDPR} onChange={e=>setConsentGDPR(e.target.checked)}/><span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}>I consent to Aevivo storing my name, email, and the research-interest selections I made here, to deliver my match. I can request deletion any time at <a href={`mailto:${INFO_EMAIL}`} style={{color:C.gold}}>{INFO_EMAIL}</a>. (GDPR Art. 6(1)(a) consent.)</span></label>
              <label className="consent-row"><input type="checkbox" checked={consentNewsletter} onChange={e=>setConsentNewsletter(e.target.checked)}/><span className="s" style={{fontSize:13,color:C.muted,lineHeight:1.55}}>Optional: subscribe me to the Aevivo research-notes newsletter.</span></label>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              <a href="#" onClick={e=>{e.preventDefault();setStep(2)}} className="bo">← Back</a>
              <button type="submit" className="bp" disabled={!canSubmit}>Reveal my match →</button>
            </div>
          </form>
        )}

        {step === 'results' && result && (
          <>
            <div className="s" style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:C.gold,marginBottom:14,fontWeight:600}}>Your Match</div>
            <h1 style={{fontSize:"clamp(32px,4vw,48px)",color:C.navy,fontWeight:400,lineHeight:1.1,marginBottom:14,fontFamily:"'Libre Baskerville',serif"}}>
              {name ? `${name}, your Aevivo Peptide Match.` : "Your Aevivo Peptide Match."}
            </h1>
            <p className="s" style={{fontSize:15,color:C.muted,lineHeight:1.65,fontWeight:300,marginBottom:32,maxWidth:680}}>
              Curated for your ranked interests: {result.selectedTags.slice().sort((a,b)=>b.priority-a.priority).map((t,i) => <span key={t.id} style={{color:C.navy,fontWeight:500}}>{i>0?", ":""}#{MAX_TAGS - t.priority + 1} {primaryTagLabel(t.id)}</span>)}. {result.routeToCall
                ? "Your research interest best fits a peptide outside our standard Phase I catalog. Let's talk."
                : ` ${result.picked.length} peptide${result.picked.length>1?"s":""} matched, weighted by the order you set.`}
            </p>

            {!result.routeToCall && (
              <>
                <div style={{display:"flex",gap:24,flexWrap:"wrap",marginBottom:32,padding:"14px 22px",border:`1px solid ${C.border}`,borderRadius:12,background:C.white}}>
                  <div><div className="s" style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:4}}>Peptides</div><div style={{fontSize:20,color:C.gold,fontFamily:"'Libre Baskerville',serif"}}>{result.picked.length}</div></div>
                  <div><div className="s" style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:4}}>Founder's Price</div><div style={{fontSize:20,color:C.gold,fontFamily:"'Libre Baskerville',serif"}}>€{totalFF}<span className="s" style={{fontSize:12,color:C.muted,marginLeft:6}}>/ cycle</span></div></div>
                  <div><div className="s" style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:4}}>Retail equivalent</div><div style={{fontSize:16,color:C.muted,fontFamily:"'Libre Baskerville',serif",textDecoration:"line-through"}}>€{totalRetail}</div></div>
                </div>

                {result.picked.map((p, i) => (
                  <div key={i} className="result-card">
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,flexWrap:"wrap",marginBottom:14}}>
                      <div style={{flex:"1 1 auto",minWidth:0}}>
                        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
                          <h2 style={{fontSize:"clamp(20px,2.2vw,26px)",color:C.navy,fontWeight:500,fontFamily:"'Libre Baskerville',serif"}}>{p.n}</h2>
                          <span className="grade-badge">Evidence {p.grade}</span>
                          <span className="s" style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,fontWeight:500}}>{p.cat}</span>
                        </div>
                        <div className="s" style={{fontSize:12,color:C.muted,letterSpacing:0.3,marginBottom:14}}>{p.sp}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div className="price-line">€{p.pf}<span className="price-retail">€{p.pr}</span></div>
                        <div className="s" style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginTop:4}}>Founder's price</div>
                      </div>
                    </div>
                    <p className="s" style={{fontSize:14,color:C.text,lineHeight:1.65,fontWeight:300,marginBottom:12}}>{p.desc}</p>
                    {p.plain && (
                      <div style={{padding:"12px 14px",background:"rgba(196,162,101,0.06)",borderLeft:`2px solid ${C.gold}`,borderRadius:6,marginBottom:14}}>
                        <span className="s" style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:C.gold,fontWeight:600,marginRight:8}}>What this means</span>
                        <span className="s" style={{fontSize:13,color:C.text,lineHeight:1.6}}>{p.plain}</span>
                      </div>
                    )}
                    <div className="s" style={{fontSize:12,color:C.muted,lineHeight:1.6,fontStyle:"italic",paddingTop:12,borderTop:`1px solid ${C.border}`}}>
                      <span style={{color:C.gold,fontStyle:"normal",fontWeight:500}}>Landmark reference:</span> {p.ref}
                    </div>
                  </div>
                ))}
              </>
            )}

            {(result.uncoveredSuggestions.length > 0 || result.offList.length > 0) && (
              <div style={{padding:"24px",border:`1px dashed ${C.gold}`,borderRadius:14,background:"rgba(196,162,101,0.05)",marginBottom:24}}>
                <div className="s" style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.gold,marginBottom:14,fontWeight:600}}>Also worth exploring</div>
                {result.uncoveredSuggestions.length > 0 && (
                  <>
                    <p className="s" style={{fontSize:13,color:C.text,lineHeight:1.65,marginBottom:12}}>
                      You picked more research areas than one stack can cover well. For these, the best-aligned peptide in our range is noted below. Book a Peptide Concierge Call to explore them properly.
                    </p>
                    <ul style={{listStyle:"none",padding:0,margin:"0 0 12px"}}>
                      {result.uncoveredSuggestions.map((u,i) => (
                        <li key={i} className="s" style={{fontSize:13,color:C.text,lineHeight:1.7,padding:"6px 0",borderBottom: i < result.uncoveredSuggestions.length-1 ? `1px solid ${C.border}` : "none"}}>
                          <strong style={{color:C.navy}}>{u.tag}</strong> <span style={{color:C.gold,fontSize:11,fontWeight:500}}>(your rank #{MAX_TAGS - u.priority + 1})</span> {u.peptide ? <span style={{color:C.muted}}>→ {u.peptide}</span> : <span style={{color:C.muted}}>→ sits outside our Phase I catalog</span>}
                        </li>
                      ))}
                    </ul>
                  </>
                )}
                {result.offList.map(k => (<p key={k} className="s" style={{fontSize:13,color:C.muted,lineHeight:1.65,marginBottom:8}}>{OFF_LIST_NOTES[k]}</p>))}
              </div>
            )}

            <div style={{padding:"24px",border:`1px solid ${C.border}`,borderRadius:14,background:C.white,marginBottom:32}}>
              <div className="s" style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.navy,marginBottom:14,fontWeight:600}}>How to read the evidence grades</div>
              <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"8px 16px",marginBottom:16}}>
                <span className="grade-badge" style={{justifySelf:"start",alignSelf:"start"}}>A</span>
                <span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}><strong>Strong human evidence.</strong> Approved by medical regulators or backed by large Phase 3 clinical trials.</span>
                <span className="grade-badge" style={{justifySelf:"start",alignSelf:"start"}}>B</span>
                <span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}><strong>Good human evidence.</strong> Phase 2 trials, or approved in multiple countries outside the US.</span>
                <span className="grade-badge" style={{justifySelf:"start",alignSelf:"start"}}>C</span>
                <span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}><strong>Emerging evidence.</strong> Small human studies, strong animal data, decades of international use.</span>
                <span className="grade-badge" style={{justifySelf:"start",alignSelf:"start"}}>D</span>
                <span className="s" style={{fontSize:13,color:C.text,lineHeight:1.55}}><strong>Early or limited evidence.</strong> Mostly animal data, case reports, or anecdotal use. Proceed with extra care.</span>
              </div>
              <p className="s" style={{fontSize:12,color:C.muted,lineHeight:1.65,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
                Research evolves as new data emerges. Discuss any peptide-related research plans with a qualified scientific advisor. Nothing here is medical advice.
              </p>
            </div>

            <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:40}}>
              {!result.routeToCall && orderUrl && (
                <a href={orderUrl} className="bp">Order at aevivo.com →</a>
              )}
              <a href={CALENDLY_URL} target="_blank" rel="noopener" className={result.routeToCall ? "bp" : "bo"}>
                {result.routeToCall ? "Book a Peptide Concierge Call →" : "Book a Peptide Concierge Call"}
              </a>
              <a href={whatsappUrl} target="_blank" rel="noopener" className="bw">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#FFFFFF"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                Chat on WhatsApp
              </a>
              <button className="bo" onClick={restart}>↺ Start over</button>
            </div>

            <div style={{padding:"18px 22px",borderTop:`1px solid ${C.border}`,fontSize:12,color:C.muted,lineHeight:1.6,fontFamily:"'Inter',sans-serif"}}>
              Aevivo products are sold for research purposes only. These products have not been evaluated by any medical regulatory authority for human use. Nothing on this page is medical advice. Contact <a href={`mailto:${INFO_EMAIL}`} style={{color:C.gold,textDecoration:"none"}}>{INFO_EMAIL}</a> for data-deletion requests or questions.
            </div>
          </>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
